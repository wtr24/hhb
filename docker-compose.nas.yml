services:
  timescaledb:
    image: timescale/timescaledb:2.18.2-pg16
    container_name: hhb-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: hhb-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: wtr24dev/hhb-backend:latest
    container_name: hhb-backend
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000 --log-level info"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  beat:
    image: wtr24dev/hhb-backend:latest
    container_name: hhb-beat
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A ingestion.celery_app beat --loglevel=info

  worker:
    image: wtr24dev/hhb-backend:latest
    container_name: hhb-worker
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A ingestion.celery_app worker --loglevel=info -c 2

  frontend:
    image: wtr24dev/hhb-frontend:latest
    container_name: hhb-frontend
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    ports:
      - "3009:80"
    env_file: .env

  watchtower:
    image: containrrr/watchtower
    container_name: hhb-watchtower
    restart: unless-stopped
    command: --interval 300 --cleanup --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  redis_data:
  timescaledb_data:
